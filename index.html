<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Para Você, Mãe — Uma Viagem no Tempo</title>
    <meta
      name="description"
      content="Uma homenagem cinematográfica para o Dia das Mães."
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Playfair+Display:wght@400;600&family=Great+Vibes&family=Dancing+Script:wght@400;600&family=Share+Tech+Mono&family=Inter:wght@300;400;500&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="admin.css" />
    <script src="site-config.js"></script>
  </head>
  <body>
    <canvas id="particles"></canvas>
    <div class="film-grain"></div>
    <div class="film-dust"></div>
    <div class="camera-flicker"></div>
    <div class="vignette"></div>
    <div class="cursor-ring"></div>
    <div class="cursor-dot"></div>

    <!-- CENA 1 -->
    <section id="scene-start" class="scene active">
      <div class="start-wrap text-center">
        <div class="clock-display" id="clockStart">
          <div class="clock-time" id="startTime">00:00:00</div>
          <div class="clock-date" id="startDate">— / — / ——</div>
        </div>
        <button id="startBtn" class="btn-start" aria-label="Começar">
          <span>START</span>
        </button>
        <p class="start-quote">Alguns momentos merecem ser revisitados…</p>
      </div>
    </section>

    <!-- CENA 2 -->
    <section id="scene-rewind" class="scene">
      <div class="rewind-wrap text-center">
        <div class="clock-display rewinding">
          <div class="clock-time" id="rewindTime">00:00:00</div>
          <div class="clock-date" id="rewindDate">11/05/2026</div>
        </div>
        <div class="glitch-overlay"></div>
      </div>
    </section>

    <!-- CENA 3 — slides injetados dinamicamente -->
    <section id="scene-slideshow" class="scene">
      <div class="slideshow-wrap" id="slideshowWrap">
        <div class="slide-caption" id="slideCaption"></div>
      </div>
    </section>

    <!-- CENA 4 -->
    <section id="scene-message" class="scene">
      <div class="message-wrap text-center">
        <p class="typed" id="typedText"></p>
      </div>
    </section>

    <!-- CENA 5 -->
    <section id="scene-final" class="scene">
      <div class="final-wrap text-center">
        <div class="clock-display frozen">
          <div class="clock-time" id="finalTime">--:--:--</div>
          <div class="clock-date" id="finalDate">— / — / ——</div>
        </div>
        <p class="final-quote">
          <span data-edit="finalQuoteLine1">O tempo passa…</span><br />
          <span data-edit="finalQuoteLine2"
            >mas alguns momentos permanecem eternos.</span
          >
        </p>
        <h1 class="final-title">
          <span data-edit="finalTitle">Feliz Dia das Mães</span>
          <span
            class="heart"
            id="replayHeart"
            role="button"
            aria-label="Reviver memórias"
            title="Toque para reviver"
            >❤</span
          >
        </h1>
      </div>
    </section>

    <!-- Botão flutuante discreto pra abrir admin (também: Ctrl+Shift+E) -->
    <button
      id="adminToggle"
      class="admin-toggle"
      title="Modo administrador (Ctrl+Shift+E)"
      aria-label="Abrir editor"
    >
      ⚙
    </button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
    <script src="script.js"></script>
    <script src="admin.js"></script>
  </body>
</html>
